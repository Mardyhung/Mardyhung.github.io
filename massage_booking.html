<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Vision 按摩預約系統 v10.1</title>
    <!-- 核心框架：改用更穩定的 CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --sky-blue: #3b82f6;
            --sky-dark: #0f172a;
        }

        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 滾動條隱藏 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* 動畫效果 */
        .animate-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* 介面細節優化 */
        .booking-btn:active { transform: scale(0.97); }
        .card-container {
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        /* 響應式字體調整 */
        @media (max-width: 380px) {
            .text-title { font-size: 1.25rem; }
            .slot-grid { grid-template-cols: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const ADMIN_PASSWORD = "23128951";
            const START_HOUR = 18; const START_MIN = 30; const END_HOUR = 23;

            // --- 狀態管理 ---
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [pwd, setPwd] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);

            // --- 資料持久化 (LocalStorage) ---
            const [availableDates, setAvailableDates] = useState(() => {
                try {
                    const saved = localStorage.getItem('sv_dates_v10');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });
            
            const [bookings, setBookings] = useState(() => {
                try {
                    const saved = localStorage.getItem('sv_bookings_v10');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });

            // 同步代碼 (讓全公司共用資料的 Key)
            const [syncID, setSyncID] = useState(() => localStorage.getItem('sv_sync_id') || '');

            // 預約表單
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [newDateInput, setNewDateInput] = useState('');

            // 自動儲存至本地
            useEffect(() => {
                localStorage.setItem('sv_dates_v10', JSON.stringify(availableDates));
                localStorage.setItem('sv_bookings_v10', JSON.stringify(bookings));
                localStorage.setItem('sv_sync_id', syncID);
            }, [availableDates, bookings, syncID]);

            // --- 極簡雲端同步功能 ---
            // 周董，這裡我們使用一個免授權的 JSON 公庫 (npoint) 進行資料中轉，不需設定 Lark
            const handleSync = async (mode = 'pull') => {
                if (!syncID || syncID.length < 5) return alert("請先設定有效的同步 ID (至少5碼)");
                setIsSyncing(true);
                try {
                    const endpoint = `https://api.npoint.io/${syncID}`;
                    if (mode === 'pull') {
                        const res = await fetch(endpoint);
                        if (res.ok) {
                            const data = await res.json();
                            if (data.dates) setAvailableDates(data.dates);
                            if (data.books) setBookings(data.books);
                        } else {
                            alert("尚未建立雲端存檔，請先執行一次上傳(Push)");
                        }
                    } else {
                        await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ dates: availableDates, books: bookings })
                        });
                        alert("資料已上傳至雲端中樞");
                    }
                } catch (e) {
                    alert("同步失敗，請確認網路連線");
                } finally {
                    setIsSyncing(false);
                }
            };

            // --- 管理端邏輯 ---
            const addDate = () => {
                if (!newDateInput) return;
                const updated = [...availableDates, { id: Date.now(), val: newDateInput }].sort((a,b) => a.val.localeCompare(b.val));
                setAvailableDates(updated);
                setNewDateInput('');
            };

            const removeDate = (id) => {
                if (confirm("移除此日期會導致該日期的預約資訊隱藏，確定嗎？")) {
                    setAvailableDates(availableDates.filter(d => d.id !== id));
                }
            };

            const deleteBooking = (id) => {
                if (confirm("確定刪除此筆預約？")) {
                    setBookings(bookings.filter(b => b.id !== id));
                }
            };

            // --- 預約邏輯 ---
            const slots = useMemo(() => {
                const s = [];
                let current = START_HOUR * 60 + START_MIN;
                while (current + 30 <= END_HOUR * 60) {
                    s.push({ label: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, total: current });
                    current += 30;
                }
                return s;
            }, []);

            const isOccupied = (date, start, duration) => {
                return bookings.some(b => b.date === date && start < (b.startMin + b.duration) && (start + duration) > b.startMin);
            };

            const confirmBooking = () => {
                if (!userName.trim() || !selectedSlot || !selectedDate) return alert("請完整填寫姓名與時段");
                const newBooking = {
                    id: Date.now(),
                    name: userName.trim(),
                    date: selectedDate,
                    time: selectedSlot.label,
                    duration: selectedDuration,
                    startMin: selectedSlot.total,
                    createdAt: Date.now()
                };
                setBookings([...bookings, newBooking]);
                setBookingConfirmed(true);
            };

            return (
                <div className="w-full min-h-screen py-6 sm:py-12 px-5 flex flex-col items-center">
                    <div className="w-full max-w-md bg-white rounded-[44px] card-container overflow-hidden flex flex-col min-h-[820px] animate-up border border-slate-200/50">
                        
                        {/* Header */}
                        <div className="bg-slate-900 px-8 sm:px-10 py-12 text-white shrink-0 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-48 h-48 bg-blue-500/10 rounded-full -mr-24 -mt-24 blur-3xl"></div>
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl sm:text-3xl font-black italic tracking-tighter leading-none text-title">SKY VISION</h1>
                                    <p className="text-[9px] font-bold opacity-40 uppercase tracking-[0.4em] mt-3">Resources Dispatcher v10.1</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => handleSync('pull')} className="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-blue-600 transition-all active:scale-90 border border-white/10">
                                        <i className={`fas fa-sync-alt text-xs ${isSyncing ? 'animate-spin' : ''}`}></i>
                                    </button>
                                    <button onClick={() => setShowAdminLogin(true)} className="px-5 py-2.5 bg-white/5 hover:bg-white/10 rounded-full text-[10px] font-black uppercase tracking-widest transition-all border border-white/20 active:scale-90">Admin</button>
                                </div>
                            </div>
                        </div>

                        {/* Admin Auth Modal */}
                        {showAdminLogin && !isAdmin && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-10">
                                <div className="bg-white p-10 rounded-[44px] w-full max-w-sm shadow-2xl animate-up">
                                    <h3 className="text-xl font-black mb-8 italic text-center uppercase tracking-widest text-slate-900">Manager Passcode</h3>
                                    <input type="password" autoFocus placeholder="••••••••" className="w-full border-b-4 border-slate-100 py-4 mb-10 outline-none font-black text-4xl text-center focus:border-blue-600 transition-all" onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && (pwd === ADMIN_PASSWORD ? (setIsAdmin(true), setShowAdminLogin(false)) : alert('錯誤密碼'))}/>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowAdminLogin(false)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Cancel</button>
                                        <button onClick={() => pwd === ADMIN_PASSWORD ? (setIsAdmin(true), setShowAdminLogin(false)) : alert('錯誤密碼')} className="flex-1 bg-slate-900 text-white rounded-3xl py-4 font-black text-xs uppercase tracking-widest">Verify</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Main Body */}
                        <div className="flex-1 p-8 sm:p-10 overflow-y-auto scrollbar-hide">
                            {isAdmin ? (
                                <div className="space-y-12 animate-fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-black italic underline decoration-blue-600 decoration-4 underline-offset-8">Admin Base</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b-2 border-slate-200">Exit</button>
                                    </div>

                                    {/* 雲端同步 ID 管理 */}
                                    <div className="bg-blue-50 p-7 rounded-[32px] border border-blue-100 shadow-inner">
                                        <label className="text-[10px] font-black text-blue-400 mb-4 block tracking-widest uppercase">企業雲端同步碼</label>
                                        <div className="flex gap-3">
                                            <input type="text" value={syncID} onChange={e => setSyncID(e.target.value)} placeholder="自定義代碼 (如: sky01)" className="flex-1 bg-white border border-blue-200 rounded-2xl px-5 py-3 text-sm font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" />
                                            <button onClick={() => handleSync('push')} className="bg-blue-600 text-white px-6 rounded-2xl font-black text-xs shadow-lg active:scale-95">PUSH</button>
                                        </div>
                                        <p className="text-[9px] text-blue-400 mt-4 leading-relaxed font-medium italic">提示：在全公司的裝置上填入相同代碼，即可同步預約狀況。</p>
                                    </div>

                                    {/* 日期管理 */}
                                    <div className="bg-slate-50 p-7 rounded-[32px] border border-slate-100 shadow-inner">
                                        <label className="text-[10px] font-black text-slate-400 mb-5 block tracking-widest uppercase italic">Define Open Dates</label>
                                        <div className="flex gap-3">
                                            <input type="date" value={newDateInput} onChange={e => setNewDateInput(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold outline-none" />
                                            <button onClick={addDate} className="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs">ADD</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-8">
                                            {availableDates.map(d => (
                                                <div key={d.id} className="bg-white border border-slate-200 pl-4 pr-1.5 py-1.5 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm group">
                                                    {d.val}
                                                    <button onClick={() => removeDate(d.id)} className="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-times scale-75"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 預約紀錄監視 */}
                                    <div className="space-y-6">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] px-1 border-l-4 border-slate-900 ml-1 pl-4">Record Monitor</h3>
                                        <div className="space-y-4">
                                            {bookings.length === 0 && <p className="text-xs text-slate-300 italic text-center py-10 font-bold uppercase">No records found</p>}
                                            {bookings.sort((a,b) => b.createdAt - a.createdAt).map(b => (
                                                <div key={b.id} className="bg-white border border-slate-100 p-6 rounded-[32px] flex justify-between items-center shadow-sm border-l-[8px] border-l-slate-900">
                                                    <div>
                                                        <span className="font-black text-slate-800 text-xl tracking-tight leading-none block mb-2">{b.date} <span className="text-blue-600 ml-2">{b.time}</span></span>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <i className="fas fa-user-circle text-slate-300"></i> {b.name} <span className="opacity-20">/</span> {b.duration}MIN
                                                        </p>
                                                    </div>
                                                    <button onClick={() => deleteBooking(b.id)} className="w-12 h-12 flex items-center justify-center text-slate-200 hover:text-red-500 transition-all"><i className="fas fa-trash-alt"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : !bookingConfirmed ? (
                                <div className="space-y-12 animate-fade-in pb-10">
                                    {/* Step 01 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">01 / Choose Date</label>
                                        <div className="flex gap-4 overflow-x-auto pb-8 scrollbar-hide px-1">
                                            {availableDates.length === 0 && <p className="text-[10px] text-slate-300 font-bold italic p-6 bg-slate-50 rounded-[32px] w-full text-center">目前暫無開放日期，請聯繫管理人員</p>}
                                            {availableDates.map(d => (
                                                <button key={d.id} onClick={() => {setSelectedDate(d.val); setSelectedSlot(null);}} className={`flex-shrink-0 px-8 py-7 rounded-[36px] border-2 transition-all flex flex-col items-center min-w-[140px] ${selectedDate === d.val ? 'border-blue-600 bg-blue-600 text-white shadow-2xl shadow-blue-600/40 scale-105' : 'border-slate-100 bg-white text-slate-400 hover:border-slate-200'}`}>
                                                    <span className="text-[10px] font-black opacity-60 mb-2 italic tracking-[0.2em]">{d.val.split('-')[1]}/{d.val.split('-')[2]}</span>
                                                    <span className="text-xl font-black uppercase tracking-tighter">{new Date(d.val).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Step 02 & 03 */}
                                    <div className="grid grid-cols-1 gap-12">
                                        <div className="space-y-6 px-1">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">02 / Identity</label>
                                            <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-50 border-0 border-b-4 border-slate-200 py-4 outline-none font-black text-3xl focus:border-blue-600 transition-all text-slate-900 placeholder:text-slate-200" placeholder="Full Name..." />
                                        </div>
                                        <div className="space-y-6 px-1">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">03 / Service Duration</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                {[30, 60].map(dur => (
                                                    <button key={dur} onClick={() => {setSelectedDuration(dur); setSelectedSlot(null);}} className={`py-7 rounded-[28px] border-2 font-black transition-all flex flex-col items-center justify-center gap-1 ${selectedDuration === dur ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-xl' : 'border-slate-100 text-slate-400 bg-white hover:border-slate-200'}`}>
                                                        <span className="text-3xl leading-none">{dur}</span>
                                                        <span className="text-[10px] uppercase tracking-widest opacity-60">Minutes</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Step 04 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">04 / Select Time</label>
                                        <div className="grid grid-cols-4 gap-3 px-1">
                                            {slots.map(s => {
                                                const occ = isOccupied(selectedDate, s.total, selectedDuration);
                                                return (
                                                    <button key={s.label} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-5 rounded-2xl text-sm font-black transition-all ${occ ? 'bg-slate-100 text-slate-300 border-0 opacity-40 cursor-not-allowed border-dashed border border-slate-200' : selectedSlot?.label === s.label ? 'bg-slate-900 text-white shadow-2xl scale-110 ring-8 ring-slate-100 z-10' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600 hover:shadow-md'}`}>
                                                        {s.label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="pt-8 px-1">
                                        <button disabled={!selectedSlot || !userName} onClick={confirmBooking} className="booking-btn w-full py-8 rounded-[36px] font-black text-2xl shadow-2xl transition-all flex items-center justify-center gap-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:brightness-110 shadow-blue-600/30 disabled:from-slate-100 disabled:to-slate-200 disabled:text-slate-300 disabled:shadow-none">
                                            {'SECURE APPOINTMENT'}
                                            <i className="fas fa-chevron-right text-base opacity-30"></i>
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-16 text-center space-y-14 animate-fade-in">
                                    <div className="relative inline-block scale-150">
                                        <div className="w-24 h-24 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl relative z-10 animate-bounce">
                                            <i className="fas fa-check text-4xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20"></div>
                                    </div>
                                    <div>
                                        <h2 className="text-5xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">SUCCESS!</h2>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.5em] text-[11px] mt-10 leading-relaxed px-6">預約資料已存入本地端<br/>請記得提醒管理員進行雲端同步</p>
                                    </div>
                                    <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-400 hover:text-blue-600 font-black text-[12px] tracking-widest uppercase transition-all flex items-center justify-center gap-4 mx-auto py-10 group">
                                        <i className="fas fa-arrow-left group-hover:-translate-x-2 transition-transform"></i> BACK TO DISPATCHER
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="bg-white px-10 py-12 border-t border-slate-100 text-center shrink-0">
                            <p className="text-[8px] text-slate-300 font-black tracking-[0.8em] uppercase leading-relaxed italic opacity-70">
                                SKY VISION LEAGUE - DIGITAL INFRASTRUCTURE<br/>
                                <span className="text-blue-500/40">STANDALONE NODE</span> | SYSTEM v10.1
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
