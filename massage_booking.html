<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Vision 按摩預約系統 v9.3</title>
    <!-- 核心框架 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 雲端資料庫 SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.fb = { initializeApp, getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .booking-btn:active { transform: scale(0.96); }
        .custom-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const START_HOUR = 18; const START_MIN = 30; const END_HOUR = 23;
            const ADMIN_PASSWORD = "23128951";
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'massage-booking-default';

            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [pwd, setPwd] = useState('');
            
            const [availableDates, setAvailableDates] = useState([]);
            const [bookings, setBookedSlots] = useState([]);
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);
            const [newDateInput, setNewDateInput] = useState('');
            const [db, setDb] = useState(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = fb.initializeApp(firebaseConfig);
                        const auth = fb.getAuth(app);
                        const firestore = fb.getFirestore(app);
                        setDb(firestore);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(auth);
                        }

                        const unsubscribe = fb.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                        });
                        return unsubscribe;
                    } catch (e) {
                        console.error("Firebase init failed:", e);
                    }
                };
                const unsub = initFirebase();
                return () => unsub && typeof unsub === 'function' && unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const dateCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates');
                const unsubDates = fb.onSnapshot(dateCol, 
                    (snap) => {
                        const dates = snap.docs.map(d => ({id: d.id, ...d.data()}));
                        setAvailableDates(dates.sort((a,b) => (a.val || '').localeCompare(b.val || '')));
                    },
                    (error) => console.error("Cloud Dates Sync Error:", error)
                );

                const bookCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const unsubBooks = fb.onSnapshot(bookCol, 
                    (snap) => {
                        setBookedSlots(snap.docs.map(d => ({id: d.id, ...d.data()})));
                        setIsLoading(false);
                    },
                    (error) => console.error("Cloud Bookings Sync Error:", error)
                );

                return () => {
                    unsubDates();
                    unsubBooks();
                };
            }, [user, db, appId]);

            const addDate = async () => {
                if(!newDateInput || !db || !user) return;
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates'), { val: newDateInput });
                    setNewDateInput('');
                } finally {
                    setIsSyncing(false);
                }
            };

            const removeDate = async (id) => {
                if(!confirm("確定移除此日期？") || !db || !user) return;
                await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'available_dates', id));
            };

            const deleteBooking = async (id) => {
                if(!confirm("確定刪除此預約紀錄？") || !db || !user) return;
                await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id));
            };

            const submitBooking = async () => {
                if(!userName.trim() || !selectedSlot || !db || !user) return alert("請填寫完整資訊");
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        name: userName,
                        date: selectedDate,
                        time: selectedSlot.label,
                        duration: selectedDuration,
                        startMin: selectedSlot.total,
                        createdAt: Date.now()
                    });
                    setBookingConfirmed(true);
                } catch(e) {
                    alert("預約失敗，請確認連線");
                } finally {
                    setIsSyncing(false);
                }
            };

            const slots = useMemo(() => {
                const s = [];
                let current = START_HOUR * 60 + START_MIN;
                while (current + 30 <= END_HOUR * 60) {
                    s.push({ label: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, total: current });
                    current += 30;
                }
                return s;
            }, []);

            const isOccupied = (date, start, duration) => {
                return bookings.some(b => b.date === date && start < (b.startMin + b.duration) && (start + duration) > b.startMin);
            };

            if (isLoading && !user) return <div className="flex h-screen items-center justify-center font-black text-slate-400 italic animate-pulse tracking-widest uppercase">Initializing...</div>;

            return (
                <div className="w-full min-h-screen py-4 sm:py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-lg bg-white rounded-[32px] sm:rounded-[40px] custom-shadow overflow-hidden flex flex-col min-h-[750px] animate-up border border-slate-200/50">
                        
                        {/* Header */}
                        <div className="bg-slate-900 px-6 sm:px-10 py-8 text-white shrink-0 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-600/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl sm:text-3xl font-black italic tracking-tighter leading-none">SKY VISION</h1>
                                    <p className="text-[9px] font-bold opacity-50 uppercase tracking-[0.3em] mt-1.5 flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                                        Smart Dispatcher v9.3
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => fetchBookings()} className="w-9 h-9 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all border border-white/10 active:scale-90">
                                        <i className={`fas fa-sync-alt text-[10px] ${isSyncing ? 'animate-spin' : ''}`}></i>
                                    </button>
                                    <button onClick={() => setShowAdminLogin(true)} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-full text-[10px] font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20 active:scale-90">Admin</button>
                                </div>
                            </div>
                        </div>

                        {/* Admin Login Modal */}
                        {showAdminLogin && !isAdmin && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-6">
                                <div className="bg-white p-8 rounded-[36px] w-full max-w-sm shadow-2xl animate-up">
                                    <h3 className="text-xl font-black mb-6 italic text-center uppercase tracking-widest text-slate-800">Identity Verification</h3>
                                    <input type="password" autoFocus placeholder="Passcode..." className="w-full border-b-2 border-slate-100 py-4 mb-8 outline-none font-black text-3xl text-center focus:border-blue-600 transition-all" onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && (pwd === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Passcode Invalid'))}/>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowAdminLogin(false)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase hover:text-slate-600 transition-all">Cancel</button>
                                        <button onClick={() => pwd === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Passcode Invalid')} className="flex-1 bg-slate-900 text-white rounded-2xl py-4 font-black text-xs uppercase tracking-widest shadow-xl">Verify</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Body */}
                        <div className="flex-1 p-6 sm:p-10 overflow-y-auto scrollbar-hide">
                            {isAdmin ? (
                                <div className="space-y-10 animate-fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-xl font-black italic underline decoration-blue-600 decoration-4 underline-offset-8">Admin Dashboard</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-200 pb-1">Exit Portal</button>
                                    </div>

                                    <div className="bg-slate-50 p-6 rounded-[28px] border border-slate-100 shadow-inner">
                                        <label className="text-[10px] font-black text-slate-400 mb-4 block tracking-widest uppercase">Open Availability</label>
                                        <div className="flex gap-2">
                                            <input type="date" value={newDateInput} onChange={e => setNewDateInput(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" />
                                            <button onClick={addDate} disabled={isSyncing} className="bg-slate-900 text-white px-6 rounded-xl font-black text-xs hover:bg-black transition-all shadow-lg">ADD</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-6">
                                            {availableDates.map(d => (
                                                <div key={d.id} className="bg-white border border-slate-200 pl-4 pr-1.5 py-1.5 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm hover:border-slate-300 transition-all group">
                                                    {d.val}
                                                    <button onClick={() => removeDate(d.id)} className="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-times scale-75"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-5">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-1 border-l-4 border-slate-900 ml-1 pl-3">Record Monitor</h3>
                                        <div className="space-y-3">
                                            {bookings.length === 0 && <p className="text-xs text-slate-300 italic text-center py-10 font-bold uppercase tracking-widest">Database Empty</p>}
                                            {bookings.sort((a,b) => b.createdAt - a.createdAt).map(b => (
                                                <div key={b.id} className="bg-white border border-slate-100 p-5 rounded-2xl flex justify-between items-center shadow-sm hover:border-blue-200 transition-all group border-l-[6px] border-l-slate-900">
                                                    <div>
                                                        <div className="flex items-center gap-3 mb-1.5">
                                                            <span className="font-black text-slate-800 text-lg tracking-tight">{b.date} <span className="text-blue-600 ml-1">{b.time}</span></span>
                                                        </div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <i className="fas fa-user-circle"></i> {b.name} <span className="opacity-30">/</span> {b.duration}MIN
                                                        </p>
                                                    </div>
                                                    <button onClick={() => deleteBooking(b.id)} className="w-10 h-10 flex items-center justify-center text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-full transition-all group-hover:scale-110"><i className="fas fa-trash-alt text-sm"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : !bookingConfirmed ? (
                                <div className="space-y-12 animate-fade-in pb-10">
                                    {/* Section 01 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-4 leading-none py-1">01 / Choose Date</label>
                                        <div className="flex gap-3 overflow-x-auto pb-6 scrollbar-hide px-1">
                                            {availableDates.length === 0 && !isLoading && <p className="text-[10px] text-slate-400 font-bold italic p-4 bg-slate-50 rounded-2xl w-full text-center">暫無開放日期，請聯繫管理人員</p>}
                                            {availableDates.map(d => (
                                                <button key={d.id} onClick={() => {setSelectedDate(d.val); setSelectedSlot(null);}} className={`flex-shrink-0 px-6 py-5 rounded-[28px] border-2 transition-all flex flex-col items-center min-w-[120px] ${selectedDate === d.val ? 'border-blue-600 bg-blue-600 text-white shadow-2xl shadow-blue-600/30 scale-105' : 'border-slate-100 bg-white text-slate-400 hover:border-slate-200 hover:text-slate-600'}`}>
                                                    <span className="text-[10px] font-black opacity-60 mb-1.5 italic tracking-[0.2em]">{d.val.split('-')[1]}/{d.val.split('-')[2]}</span>
                                                    <span className="text-base font-black uppercase tracking-tighter">{new Date(d.val).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Section 02 & 03 */}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-10">
                                        <div>
                                            <label className="text-[11px] font-black text-slate-400 mb-5 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-4">02 / Service</label>
                                            <div className="grid grid-cols-2 gap-3 px-1">
                                                {[30, 60].map(dur => (
                                                    <button key={dur} onClick={() => {setSelectedDuration(dur); setSelectedSlot(null);}} className={`py-5 rounded-2xl border-2 font-black transition-all flex flex-col items-center justify-center gap-1 ${selectedDuration === dur ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-lg' : 'border-slate-100 text-slate-400 bg-white hover:border-slate-200'}`}>
                                                        <span className="text-xl leading-none">{dur}</span>
                                                        <span className="text-[8px] uppercase tracking-widest opacity-60">MIN</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[11px] font-black text-slate-400 mb-5 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-4">03 / Identity</label>
                                            <div className="px-1">
                                                <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-50 border-0 border-b-2 border-slate-200 py-3 outline-none font-black text-2xl focus:border-blue-600 transition-all text-slate-800 placeholder:text-slate-200" placeholder="Full Name..." />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Section 04 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-4 leading-none py-1">04 / Start Time</label>
                                        <div className="grid grid-cols-4 gap-3 px-1">
                                            {slots.map(s => {
                                                const occ = isOccupied(selectedDate, s.total, selectedDuration);
                                                return (
                                                    <button key={s.label} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-4 rounded-xl text-xs font-black transition-all ${occ ? 'bg-slate-100 text-slate-300 border-0 opacity-40 cursor-not-allowed border-dashed border border-slate-200' : selectedSlot?.label === s.label ? 'bg-slate-900 text-white shadow-2xl scale-105 ring-4 ring-slate-100' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600 hover:shadow-md'}`}>
                                                        {s.label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="px-1 pt-4">
                                        <button disabled={!selectedSlot || !userName || isSyncing} onClick={submitBooking} className={`booking-btn w-full py-6 rounded-[2.5rem] font-black text-xl shadow-2xl transition-all flex items-center justify-center gap-4 ${!selectedSlot || !userName || isSyncing ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:brightness-110 shadow-blue-600/30'}`}>
                                            {isSyncing ? <i className="fas fa-circle-notch animate-spin text-2xl"></i> : 'SECURE BOOKING'}
                                            {!isSyncing && <i className="fas fa-arrow-right text-sm opacity-50"></i>}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-20 text-center space-y-12 animate-fade-in">
                                    <div className="relative inline-block scale-125">
                                        <div className="w-24 h-24 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl relative z-10 animate-bounce">
                                            <i className="fas fa-check text-4xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20"></div>
                                    </div>
                                    <div>
                                        <h2 className="text-4xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">SUCCESS!</h2>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.4em] text-[10px] mt-6 leading-relaxed">預約資料已成功排入雲端中樞<br/>請準時抵達享受療程</p>
                                    </div>
                                    <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-400 hover:text-blue-600 font-black text-[10px] tracking-widest uppercase transition-all flex items-center justify-center gap-3 mx-auto py-4 group">
                                        <i className="fas fa-arrow-left group-hover:-translate-x-2 transition-transform"></i> BACK TO DISPATCHER
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="bg-white px-10 py-8 border-t border-slate-100 text-center shrink-0">
                            <div className="flex flex-col items-center gap-3">
                                <p className="text-[8px] text-slate-400 font-black tracking-[0.6em] uppercase leading-relaxed italic opacity-70">
                                    SKY VISION LEAGUE - DIGITAL INFRASTRUCTURE<br/>
                                    <span className="text-blue-500/50">NODE: {appId}</span> | Enterprise Cloud v9.3
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
