<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Vision 按摩預約系統 v9.4</title>
    <!-- 核心框架 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 雲端資料庫 SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.fb = { initializeApp, getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .booking-btn:active { transform: scale(0.96); }
        .custom-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const START_HOUR = 18; const START_MIN = 30; const END_HOUR = 23;
            const ADMIN_PASSWORD = "23128951";
            
            // 環境變數安全檢查
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'massage-booking-sky-vision';

            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [pwd, setPwd] = useState('');
            
            const [availableDates, setAvailableDates] = useState([]);
            const [bookings, setBookedSlots] = useState([]);
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);
            const [newDateInput, setNewDateInput] = useState('');
            const [db, setDb] = useState(null);
            const [initError, setInitError] = useState(null);

            // Step 1: 初始化 Firebase 與 身份驗證
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        // 檢查配置是否存在
                        if (typeof __firebase_config === 'undefined') {
                            setInitError("Missing configuration. Please check the environment settings.");
                            setIsLoading(false);
                            return;
                        }

                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = fb.initializeApp(firebaseConfig);
                        const auth = fb.getAuth(app);
                        const firestore = fb.getFirestore(app);
                        setDb(firestore);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(auth);
                        }

                        fb.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if (u) setIsLoading(false);
                        });
                    } catch (e) {
                        setInitError("Connection failed: " + e.message);
                        setIsLoading(false);
                    }
                };
                initFirebase();
            }, []);

            // Step 2: 數據監聽
            useEffect(() => {
                if (!user || !db) return;

                const dateCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates');
                const unsubDates = fb.onSnapshot(dateCol, (snap) => {
                    setAvailableDates(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.val || '').localeCompare(b.val || '')));
                }, (err) => console.error("Dates Sync Fail", err));

                const bookCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const unsubBooks = fb.onSnapshot(bookCol, (snap) => {
                    setBookedSlots(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error("Bookings Sync Fail", err));

                return () => { unsubDates(); unsubBooks(); };
            }, [user, db, appId]);

            const addDate = async () => {
                if(!newDateInput || !db || !user) return;
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates'), { val: newDateInput });
                    setNewDateInput('');
                } finally { setIsSyncing(false); }
            };

            const removeDate = async (id) => {
                if(!confirm("確定移除此日期？")) return;
                await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'available_dates', id));
            };

            const deleteBooking = async (id) => {
                if(!confirm("確定刪除此預約紀錄？")) return;
                await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id));
            };

            const submitBooking = async () => {
                if(!userName.trim() || !selectedSlot) return alert("請填寫姓名與時段");
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        name: userName,
                        date: selectedDate,
                        time: selectedSlot.label,
                        duration: selectedDuration,
                        startMin: selectedSlot.total,
                        createdAt: Date.now()
                    });
                    setBookingConfirmed(true);
                } catch(e) { alert("提交失敗"); } finally { setIsSyncing(false); }
            };

            const slots = useMemo(() => {
                const s = [];
                let current = START_HOUR * 60 + START_MIN;
                while (current + 30 <= END_HOUR * 60) {
                    s.push({ label: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, total: current });
                    current += 30;
                }
                return s;
            }, []);

            const isOccupied = (date, start, duration) => {
                return bookings.some(b => b.date === date && start < (b.startMin + b.duration) && (start + duration) > b.startMin);
            };

            // 初始化與錯誤畫面處理
            if (isLoading) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-900 text-white p-10 text-center">
                        <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <h2 className="text-xl font-black italic tracking-widest animate-pulse">SKY VISION INITIALIZING</h2>
                        <p className="text-[10px] text-slate-500 uppercase tracking-[0.3em] mt-4">Connecting to Global Infrastructure</p>
                    </div>
                );
            }

            if (initError) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-white p-10 text-center">
                        <i className="fas fa-exclamation-triangle text-amber-500 text-4xl mb-6"></i>
                        <h2 className="text-xl font-black text-slate-800 tracking-tight">System Configuration Error</h2>
                        <p className="text-sm text-slate-400 mt-2 leading-relaxed">{initError}</p>
                    </div>
                );
            }

            return (
                <div className="w-full min-h-screen py-6 sm:py-12 px-5 flex flex-col items-center overflow-x-hidden">
                    <div className="w-full max-w-md bg-white rounded-[40px] custom-shadow overflow-hidden flex flex-col min-h-[780px] animate-up border border-slate-200/40 relative">
                        
                        {/* Header */}
                        <div className="bg-slate-900 px-8 sm:px-10 py-10 text-white shrink-0 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-blue-500/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl sm:text-3xl font-black italic tracking-tighter leading-none">SKY VISION</h1>
                                    <p className="text-[9px] font-bold opacity-40 uppercase tracking-[0.4em] mt-2">Smart Dispatcher v9.4</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => fetchBookings()} className="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all border border-white/10 active:scale-90">
                                        <i className={`fas fa-sync-alt text-xs ${isSyncing ? 'animate-spin' : ''}`}></i>
                                    </button>
                                    <button onClick={() => setShowAdminLogin(true)} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-full text-[10px] font-black uppercase tracking-widest transition-all shadow-lg active:scale-90">Admin</button>
                                </div>
                            </div>
                        </div>

                        {/* Admin Login Modal */}
                        {showAdminLogin && !isAdmin && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-8">
                                <div className="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl animate-up">
                                    <h3 className="text-xl font-black mb-8 italic text-center uppercase tracking-widest text-slate-900">Manager Verify</h3>
                                    <input type="password" autoFocus placeholder="Passcode..." className="w-full border-b-2 border-slate-100 py-4 mb-10 outline-none font-black text-4xl text-center focus:border-blue-600 transition-all" onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && (pwd === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Invalid Passcode'))}/>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowAdminLogin(false)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase hover:text-slate-800 transition-all">Cancel</button>
                                        <button onClick={() => pwd === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Invalid Passcode')} className="flex-1 bg-slate-900 text-white rounded-2xl py-4 font-black text-xs uppercase tracking-widest shadow-xl active:scale-95">Confirm</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Body */}
                        <div className="flex-1 p-8 sm:p-10 overflow-y-auto scrollbar-hide">
                            {isAdmin ? (
                                <div className="space-y-10 animate-fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-black italic underline decoration-blue-600 decoration-4 underline-offset-8">Admin Base</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b-2 border-slate-200 pb-1">Exit</button>
                                    </div>

                                    <div className="bg-slate-50 p-7 rounded-[32px] border border-slate-100 shadow-inner">
                                        <label className="text-[10px] font-black text-slate-400 mb-5 block tracking-widest uppercase">Add Open Dates</label>
                                        <div className="flex gap-3">
                                            <input type="date" value={newDateInput} onChange={e => setNewDateInput(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" />
                                            <button onClick={addDate} disabled={isSyncing} className="bg-slate-900 text-white px-7 rounded-2xl font-black text-xs hover:bg-black transition-all shadow-lg active:scale-95">ADD</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-8">
                                            {availableDates.map(d => (
                                                <div key={d.id} className="bg-white border border-slate-200 pl-4 pr-1.5 py-1.5 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm group">
                                                    {d.val}
                                                    <button onClick={() => removeDate(d.id)} className="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-times scale-75"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-1 border-l-4 border-slate-900 ml-1 pl-4">Record Monitor</h3>
                                        <div className="space-y-4 px-1">
                                            {bookings.length === 0 && <p className="text-xs text-slate-300 italic text-center py-10 font-bold uppercase tracking-widest">No Active Records</p>}
                                            {bookings.sort((a,b) => b.createdAt - a.createdAt).map(b => (
                                                <div key={b.id} className="bg-white border border-slate-100 p-6 rounded-3xl flex justify-between items-center shadow-sm hover:border-blue-200 transition-all group border-l-[8px] border-l-slate-900">
                                                    <div>
                                                        <span className="font-black text-slate-800 text-xl tracking-tight leading-none block mb-2">{b.date} <span className="text-blue-600 ml-2">{b.time}</span></span>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <i className="fas fa-user-circle text-slate-300 text-xs"></i> {b.name} <span className="opacity-20">/</span> {b.duration}MIN
                                                        </p>
                                                    </div>
                                                    <button onClick={() => deleteBooking(b.id)} className="w-12 h-12 flex items-center justify-center text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-full transition-all active:scale-90"><i className="fas fa-trash-alt text-base"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : !bookingConfirmed ? (
                                <div className="space-y-12 animate-fade-in pb-10 px-1">
                                    {/* Section 01 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">01 / Choose Date</label>
                                        <div className="flex gap-4 overflow-x-auto pb-6 scrollbar-hide px-1">
                                            {availableDates.length === 0 && <p className="text-[10px] text-slate-300 font-bold italic p-5 bg-slate-50 rounded-3xl w-full text-center">目前尚無開放時段，請聯繫管理人員</p>}
                                            {availableDates.map(d => (
                                                <button key={d.id} onClick={() => {setSelectedDate(d.val); setSelectedSlot(null);}} className={`flex-shrink-0 px-7 py-6 rounded-[32px] border-2 transition-all flex flex-col items-center min-w-[130px] ${selectedDate === d.val ? 'border-blue-600 bg-blue-600 text-white shadow-2xl shadow-blue-600/40 scale-105 font-black' : 'border-slate-100 bg-white text-slate-400 hover:border-slate-200'}`}>
                                                    <span className="text-[10px] font-black opacity-60 mb-2 italic tracking-[0.2em]">{d.val.split('-')[1]}/{d.val.split('-')[2]}</span>
                                                    <span className="text-lg font-black uppercase tracking-tighter">{new Date(d.val).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Section 02 & 03 */}
                                    <div className="grid grid-cols-1 gap-12 sm:grid-cols-2">
                                        <div className="space-y-6">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">02 / Service</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                {[30, 60].map(dur => (
                                                    <button key={dur} onClick={() => {setSelectedDuration(dur); setSelectedSlot(null);}} className={`py-6 rounded-[24px] border-2 font-black transition-all flex flex-col items-center justify-center gap-1 ${selectedDuration === dur ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-xl' : 'border-slate-100 text-slate-400 bg-white hover:border-slate-200'}`}>
                                                        <span className="text-2xl leading-none">{dur}</span>
                                                        <span className="text-[9px] uppercase tracking-widest opacity-60">MIN</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">03 / Identity</label>
                                            <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-50 border-0 border-b-2 border-slate-200 py-4 outline-none font-black text-3xl focus:border-blue-600 transition-all text-slate-900 placeholder:text-slate-200" placeholder="NAME..." />
                                        </div>
                                    </div>

                                    {/* Section 04 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">04 / Start Time</label>
                                        <div className="grid grid-cols-4 gap-3">
                                            {slots.map(s => {
                                                const occ = isOccupied(selectedDate, s.total, selectedDuration);
                                                return (
                                                    <button key={s.label} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-5 rounded-2xl text-xs font-black transition-all ${occ ? 'bg-slate-100 text-slate-200 border-0 opacity-40 cursor-not-allowed border-dashed border border-slate-200' : selectedSlot?.label === s.label ? 'bg-slate-900 text-white shadow-2xl scale-110 ring-4 ring-slate-100 z-10' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600 hover:shadow-md'}`}>
                                                        {s.label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="pt-6">
                                        <button disabled={!selectedSlot || !userName || isSyncing} onClick={submitBooking} className={`booking-btn w-full py-7 rounded-[32px] font-black text-2xl shadow-2xl transition-all flex items-center justify-center gap-5 ${!selectedSlot || !userName || isSyncing ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:brightness-110 shadow-blue-600/30'}`}>
                                            {isSyncing ? <i className="fas fa-circle-notch animate-spin text-3xl"></i> : 'SECURE BOOKING'}
                                            {!isSyncing && <i className="fas fa-chevron-right text-base opacity-30"></i>}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-16 text-center space-y-12 animate-fade-in">
                                    <div className="relative inline-block scale-150">
                                        <div className="w-24 h-24 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl relative z-10 animate-bounce">
                                            <i className="fas fa-check text-4xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20"></div>
                                    </div>
                                    <div>
                                        <h2 className="text-5xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">SUCCESS!</h2>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.5em] text-[10px] mt-8 leading-relaxed px-10">預約資料已成功排入<br/>雲端管理中樞</p>
                                    </div>
                                    <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-400 hover:text-blue-600 font-black text-[11px] tracking-widest uppercase transition-all flex items-center justify-center gap-4 mx-auto py-10 group">
                                        <i className="fas fa-arrow-left group-hover:-translate-x-2 transition-transform"></i> BACK TO HOME
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="bg-white px-10 py-10 border-t border-slate-100 text-center shrink-0">
                            <div className="flex flex-col items-center gap-4">
                                <p className="text-[8px] text-slate-400 font-black tracking-[0.7em] uppercase leading-relaxed italic opacity-60">
                                    SKY VISION LEAGUE - INFRASTRUCTURE<br/>
                                    <span className="text-blue-500/40">NODE-ID: {appId}</span> | Enterprise v9.4
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
