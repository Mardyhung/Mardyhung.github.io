<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Vision 按摩預約系統 v10.0</title>
    <!-- 核心框架 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .booking-btn:active { transform: scale(0.96); }
        .custom-shadow { box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15), 0 18px 36px -18px rgba(0, 0, 0, 0.1); }
        .input-focus:focus { ring: 3px solid rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const ADMIN_PASSWORD = "23128951";
            const START_HOUR = 18; const START_MIN = 30; const END_HOUR = 23;

            // 狀態管理
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [pwd, setPwd] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            // 資料儲存 (預設從 LocalStorage 讀取)
            const [availableDates, setAvailableDates] = useState(() => {
                const saved = localStorage.getItem('sv_dates');
                return saved ? JSON.parse(saved) : [];
            });
            const [bookings, setBookings] = useState(() => {
                const saved = localStorage.getItem('sv_bookings');
                return saved ? JSON.parse(saved) : [];
            });
            const [syncKey, setSyncKey] = useState(() => localStorage.getItem('sv_sync_key') || '');

            // 預約表單狀態
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [newDateInput, setNewDateInput] = useState('');

            // 當資料變動時，自動儲存至本地
            useEffect(() => {
                localStorage.setItem('sv_dates', JSON.stringify(availableDates));
                localStorage.setItem('sv_bookings', JSON.stringify(bookings));
                localStorage.setItem('sv_sync_key', syncKey);
            }, [availableDates, bookings, syncKey]);

            // --- 雲端同步邏輯 (使用公共極簡 API，無需 Token) ---
            const pullCloudData = async () => {
                if (!syncKey) return;
                setIsSyncing(true);
                try {
                    // 使用 npoint 等開放 JSON 儲存空間模擬雲端同步
                    const res = await fetch(`https://api.npoint.io/${syncKey}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.availableDates) setAvailableDates(data.availableDates);
                        if (data.bookings) setBookings(data.bookings);
                    }
                } catch (e) { console.error("Sync pull failed", e); }
                finally { setIsSyncing(false); }
            };

            const pushCloudData = async (newDates = availableDates, newBookings = bookings) => {
                if (!syncKey) return;
                setIsSyncing(true);
                try {
                    await fetch(`https://api.npoint.io/${syncKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ availableDates: newDates, bookings: newBookings })
                    });
                } catch (e) { console.error("Sync push failed", e); }
                finally { setIsSyncing(false); }
            };

            // 管理功能
            const handleAddDate = () => {
                if (!newDateInput) return;
                const updated = [...availableDates, { id: Date.now(), val: newDateInput }].sort((a,b) => a.val.localeCompare(b.val));
                setAvailableDates(updated);
                setNewDateInput('');
                if(syncKey) pushCloudData(updated, bookings);
            };

            const handleRemoveDate = (id) => {
                if (!confirm("確定移除此日期？")) return;
                const updated = availableDates.filter(d => d.id !== id);
                setAvailableDates(updated);
                if(syncKey) pushCloudData(updated, bookings);
            };

            const handleDeleteBooking = (id) => {
                if (!confirm("確定刪除此預約？")) return;
                const updated = bookings.filter(b => b.id !== id);
                setBookings(updated);
                if(syncKey) pushCloudData(availableDates, updated);
            };

            const handleSubmitBooking = () => {
                if (!userName.trim() || !selectedSlot || !selectedDate) return alert("請填寫姓名與時段");
                const newBooking = {
                    id: Date.now(),
                    name: userName.trim(),
                    date: selectedDate,
                    time: selectedSlot.label,
                    duration: selectedDuration,
                    startMin: selectedSlot.total,
                    createdAt: Date.now()
                };
                const updated = [...bookings, newBooking];
                setBookings(updated);
                setBookingConfirmed(true);
                if(syncKey) pushCloudData(availableDates, updated);
            };

            const slots = useMemo(() => {
                const s = [];
                let current = START_HOUR * 60 + START_MIN;
                while (current + 30 <= END_HOUR * 60) {
                    s.push({ label: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, total: current });
                    current += 30;
                }
                return s;
            }, []);

            const isOccupied = (date, start, duration) => {
                return bookings.some(b => b.date === date && start < (b.startMin + b.duration) && (start + duration) > b.startMin);
            };

            return (
                <div className="w-full min-h-screen py-4 sm:py-10 px-4 flex flex-col items-center overflow-x-hidden">
                    <div className="w-full max-w-md bg-white rounded-[40px] custom-shadow overflow-hidden flex flex-col min-h-[750px] animate-up border border-slate-200/50">
                        
                        {/* Header */}
                        <div className="bg-slate-900 px-8 py-10 text-white shrink-0 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-blue-600/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-black italic tracking-tighter leading-none">SKY VISION</h1>
                                    <p className="text-[9px] font-bold opacity-40 uppercase tracking-[0.4em] mt-2">Standalone Dispatcher v10.0</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={pullCloudData} className="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all border border-white/10 active:scale-90">
                                        <i className={`fas fa-sync-alt text-xs ${isSyncing ? 'animate-spin' : ''}`}></i>
                                    </button>
                                    <button onClick={() => setShowAdminLogin(true)} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-full text-[10px] font-black uppercase tracking-widest transition-all shadow-lg active:scale-90">Admin</button>
                                </div>
                            </div>
                        </div>

                        {/* Admin Login Modal */}
                        {showAdminLogin && !isAdmin && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-8">
                                <div className="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl animate-up">
                                    <h3 className="text-xl font-black mb-8 italic text-center uppercase tracking-widest text-slate-900">Manager Verify</h3>
                                    <input type="password" autoFocus placeholder="Passcode..." className="w-full border-b-2 border-slate-100 py-4 mb-10 outline-none font-black text-4xl text-center focus:border-blue-600 transition-all" onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && (pwd === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Invalid Passcode'))}/>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowAdminLogin(false)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase hover:text-slate-800 transition-all">Cancel</button>
                                        <button onClick={() => pwd === ADMIN_PASSWORD ? (setIsAdmin(true), setShowAdminLogin(false)) : alert('Invalid Passcode')} className="flex-1 bg-slate-900 text-white rounded-2xl py-4 font-black text-xs uppercase tracking-widest shadow-xl active:scale-95">Confirm</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Body */}
                        <div className="flex-1 p-8 sm:p-10 overflow-y-auto scrollbar-hide">
                            {isAdmin ? (
                                <div className="space-y-10 animate-fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-black italic underline decoration-blue-600 decoration-4 underline-offset-8">Admin Base</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b-2 border-slate-200 pb-1">Exit Portal</button>
                                    </div>

                                    {/* 雲端同步設定 (解決全公司共用的問題) */}
                                    <div className="bg-blue-50 p-6 rounded-[28px] border border-blue-100">
                                        <label className="text-[10px] font-black text-blue-400 mb-3 block tracking-widest uppercase">企業雲端同步 ID</label>
                                        <div className="flex gap-2">
                                            <input type="text" value={syncKey} onChange={e => setSyncKey(e.target.value)} placeholder="自定義一組代碼..." className="flex-1 bg-white border border-blue-200 rounded-xl px-4 py-2 text-xs font-bold outline-none focus:ring-4 focus:ring-blue-500/10" />
                                            <button onClick={() => pushCloudData()} className="bg-blue-600 text-white px-4 rounded-xl font-black text-[10px]">SYNC</button>
                                        </div>
                                        <p className="text-[9px] text-blue-400 mt-3 leading-relaxed font-medium">提示：全公司的人只要輸入同樣的同步 ID，就能看到彼此的預約資料。不需設定 Lark 權限。</p>
                                    </div>

                                    <div className="bg-slate-50 p-7 rounded-[32px] border border-slate-100 shadow-inner">
                                        <label className="text-[10px] font-black text-slate-400 mb-5 block tracking-widest uppercase">定義開放日期</label>
                                        <div className="flex gap-3">
                                            <input type="date" value={newDateInput} onChange={e => setNewDateInput(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold outline-none" />
                                            <button onClick={handleAddDate} className="bg-slate-900 text-white px-7 rounded-2xl font-black text-xs hover:bg-black transition-all shadow-lg active:scale-95">ADD</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-8">
                                            {availableDates.map(d => (
                                                <div key={d.id} className="bg-white border border-slate-200 pl-4 pr-1.5 py-1.5 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm">
                                                    {d.val}
                                                    <button onClick={() => handleRemoveDate(d.id)} className="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-times scale-75"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-1 border-l-4 border-slate-900 ml-1 pl-4">Record Monitor</h3>
                                        <div className="space-y-4 px-1">
                                            {bookings.length === 0 && <p className="text-xs text-slate-300 italic text-center py-10 font-bold uppercase tracking-widest">No Active Records</p>}
                                            {bookings.sort((a,b) => b.createdAt - a.createdAt).map(b => (
                                                <div key={b.id} className="bg-white border border-slate-100 p-6 rounded-3xl flex justify-between items-center shadow-sm hover:border-blue-200 transition-all border-l-[8px] border-l-slate-900">
                                                    <div>
                                                        <span className="font-black text-slate-800 text-xl tracking-tight leading-none block mb-2">{b.date} <span className="text-blue-600 ml-2">{b.time}</span></span>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <i className="fas fa-user-circle text-slate-300 text-xs"></i> {b.name} <span className="opacity-20">/</span> {b.duration}MIN
                                                        </p>
                                                    </div>
                                                    <button onClick={() => handleDeleteBooking(b.id)} className="w-12 h-12 flex items-center justify-center text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-full transition-all active:scale-90"><i className="fas fa-trash-alt text-base"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : !bookingConfirmed ? (
                                <div className="space-y-12 animate-fade-in pb-10 px-1">
                                    {/* Section 01 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">01 / Choose Date</label>
                                        <div className="flex gap-4 overflow-x-auto pb-6 scrollbar-hide px-1">
                                            {availableDates.length === 0 && <p className="text-[10px] text-slate-300 font-bold italic p-5 bg-slate-50 rounded-3xl w-full text-center">目前尚無開放時段，請聯繫管理人員</p>}
                                            {availableDates.map(d => (
                                                <button key={d.id} onClick={() => {setSelectedDate(d.val); setSelectedSlot(null);}} className={`flex-shrink-0 px-7 py-6 rounded-[32px] border-2 transition-all flex flex-col items-center min-w-[130px] ${selectedDate === d.val ? 'border-blue-600 bg-blue-600 text-white shadow-2xl shadow-blue-600/40 scale-105 font-black' : 'border-slate-100 bg-white text-slate-400 hover:border-slate-200'}`}>
                                                    <span className="text-[10px] font-black opacity-60 mb-2 italic tracking-[0.2em]">{d.val.split('-')[1]}/{d.val.split('-')[2]}</span>
                                                    <span className="text-lg font-black uppercase tracking-tighter">{new Date(d.val).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-12 sm:grid-cols-2">
                                        <div className="space-y-6">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">02 / Service</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                {[30, 60].map(dur => (
                                                    <button key={dur} onClick={() => {setSelectedDuration(dur); setSelectedSlot(null);}} className={`py-6 rounded-[24px] border-2 font-black transition-all flex flex-col items-center justify-center gap-1 ${selectedDuration === dur ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-xl' : 'border-slate-100 text-slate-400 bg-white hover:border-slate-200'}`}>
                                                        <span className="text-2xl leading-none">{dur}</span>
                                                        <span className="text-[9px] uppercase tracking-widest opacity-60">MIN</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">03 / Identity</label>
                                            <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-50 border-0 border-b-2 border-slate-200 py-4 outline-none font-black text-3xl focus:border-blue-600 transition-all text-slate-900 placeholder:text-slate-200" placeholder="NAME..." />
                                        </div>
                                    </div>

                                    {/* Section 04 */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">04 / Start Time</label>
                                        <div className="grid grid-cols-4 gap-3">
                                            {slots.map(s => {
                                                const occ = isOccupied(selectedDate, s.total, selectedDuration);
                                                return (
                                                    <button key={s.label} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-5 rounded-2xl text-xs font-black transition-all ${occ ? 'bg-slate-100 text-slate-200 border-0 opacity-40 cursor-not-allowed border-dashed border border-slate-200' : selectedSlot?.label === s.label ? 'bg-slate-900 text-white shadow-2xl scale-110 ring-4 ring-slate-100 z-10' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600 hover:shadow-md'}`}>
                                                        {s.label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="pt-6">
                                        <button disabled={!selectedSlot || !userName} onClick={handleSubmitBooking} className={`booking-btn w-full py-7 rounded-[32px] font-black text-2xl shadow-2xl transition-all flex items-center justify-center gap-5 ${!selectedSlot || !userName ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:brightness-110 shadow-blue-600/30'}`}>
                                            {'SECURE BOOKING'}
                                            <i className="fas fa-chevron-right text-base opacity-30"></i>
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-16 text-center space-y-12 animate-fade-in">
                                    <div className="relative inline-block scale-150">
                                        <div className="w-24 h-24 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl relative z-10 animate-bounce">
                                            <i className="fas fa-check text-4xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20"></div>
                                    </div>
                                    <div>
                                        <h2 className="text-5xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">SUCCESS!</h2>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.5em] text-[10px] mt-8 leading-relaxed px-10">預約資料已成功登記<br/>請準時抵達享受療程</p>
                                    </div>
                                    <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-400 hover:text-blue-600 font-black text-[11px] tracking-widest uppercase transition-all flex items-center justify-center gap-4 mx-auto py-10 group">
                                        <i className="fas fa-arrow-left group-hover:-translate-x-2 transition-transform"></i> BACK TO HOME
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="bg-white px-10 py-10 border-t border-slate-100 text-center shrink-0">
                            <div className="flex flex-col items-center gap-4">
                                <p className="text-[8px] text-slate-400 font-black tracking-[0.7em] uppercase leading-relaxed italic opacity-60">
                                    SKY VISION LEAGUE - DIGITAL INFRASTRUCTURE<br/>
                                    Integrated Single-File System v10.0
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
