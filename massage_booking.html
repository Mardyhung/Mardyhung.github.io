<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Vision 按摩預約系統 v12.0</title>
    <!-- 核心框架 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 雲端資料庫 SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.fb = { initializeApp, getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc, updateDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .custom-shadow { box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1), 0 18px 36px -18px rgba(0, 0, 0, 0.05); }
        .booking-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const ADMIN_PASSWORD = "23128951";
            // 優先使用環境提供的 appId
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sky-vision-dispatch-v12';

            // --- 基礎狀態 ---
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [pwd, setPwd] = useState('');
            const [isBooting, setIsBooting] = useState(true);
            const [errorMessage, setErrorMessage] = useState('');

            // --- 業務資料 ---
            const [availableDates, setAvailableDates] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [config, setConfig] = useState({ startTime: "18:30", endTime: "23:00" });

            // --- 預約表單狀態 ---
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [newDateInput, setNewDateInput] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);

            // --- Step 1: Firebase 初始化與身份驗證 ---
            useEffect(() => {
                const initCloud = async () => {
                    try {
                        if (typeof __firebase_config === 'undefined') {
                            setErrorMessage("環境配置缺失，請聯繫開發者。");
                            setIsBooting(false);
                            return;
                        }

                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = fb.initializeApp(firebaseConfig);
                        const auth = fb.getAuth(app);
                        const store = fb.getFirestore(app);
                        setDb(store);

                        // 執行登入邏輯
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(auth);
                        }

                        // 監聽登入狀態
                        const unsubAuth = fb.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setIsBooting(false); // 驗證成功後立即解鎖 UI
                            }
                        });
                        return unsubAuth;
                    } catch (e) {
                        setErrorMessage("雲端初始化失敗: " + e.message);
                        setIsBooting(false);
                    }
                };
                initCloud();
            }, []);

            // --- Step 2: 雲端數據即時同步 ---
            useEffect(() => {
                if (!user || !db) return;

                // 1. 同步時段設定
                const configRef = fb.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'timeConfig');
                const unsubConfig = fb.onSnapshot(configRef, (d) => {
                    if (d.exists()) setConfig(d.data());
                }, (err) => console.warn("Config link failed", err));

                // 2. 同步開放日期
                const dateCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates');
                const unsubDates = fb.onSnapshot(dateCol, (snap) => {
                    const dates = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setAvailableDates(dates.sort((a,b) => (a.val || '').localeCompare(b.val || '')));
                });

                // 3. 同步預約紀錄 (公開透明)
                const bookCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const unsubBooks = fb.onSnapshot(bookCol, (snap) => {
                    setBookings(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => {
                    setErrorMessage("讀取權限受限，請聯繫管理員確認 appId。");
                });

                return () => { unsubConfig(); unsubDates(); unsubBooks(); };
            }, [user, db, appId]);

            // --- 管理端操作 ---
            const updateTimeRange = async (field, value) => {
                const nextConfig = { ...config, [field]: value };
                setConfig(nextConfig);
                try {
                    await fb.setDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'timeConfig'), nextConfig);
                } catch(e) { alert("更新時段失敗"); }
            };

            const addDate = async () => {
                if (!newDateInput) return;
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates'), { val: newDateInput });
                    setNewDateInput('');
                } finally { setIsSyncing(false); }
            };

            const removeDate = async (id) => {
                if (!confirm("確定移除此預約日期？")) return;
                await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'available_dates', id));
            };

            const deleteBooking = async (id) => {
                if (!confirm("確定要手動刪除此預約紀錄？")) return;
                await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id));
            };

            // --- 預約核心邏輯 ---
            const slots = useMemo(() => {
                const result = [];
                const [sH, sM] = config.startTime.split(':').map(Number);
                const [eH, eM] = config.endTime.split(':').map(Number);
                let current = sH * 60 + sM;
                const endLimit = eH * 60 + eM;

                while (current + 30 <= endLimit) {
                    result.push({ 
                        label: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, 
                        total: current 
                    });
                    current += 30;
                }
                return result;
            }, [config]);

            const isOccupied = (date, start, duration) => {
                return bookings.some(b => b.date === date && start < (b.startMin + b.duration) && (start + duration) > b.startMin);
            };

            const submitBooking = async () => {
                if (!userName.trim() || !selectedSlot) return alert("請輸入完整預約資訊");
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        name: userName.trim(),
                        date: selectedDate,
                        time: selectedSlot.label,
                        duration: selectedDuration,
                        startMin: selectedSlot.total,
                        createdAt: Date.now()
                    });
                    setBookingConfirmed(true);
                } catch(e) {
                    alert("同步雲端失敗，請確認網路連線。");
                } finally { setIsSyncing(false); }
            };

            // --- UI 渲染控制 ---
            if (isBooting) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-900 text-white p-10">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <h2 className="text-xl font-black italic tracking-[0.2em] animate-pulse">CONNECTING TO SKY VISION</h2>
                    </div>
                );
            }

            if (errorMessage) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-white p-10 text-center">
                        <i className="fas fa-exclamation-circle text-red-500 text-5xl mb-6"></i>
                        <h2 className="text-xl font-black text-slate-800">Connection Error</h2>
                        <p className="text-sm text-slate-400 mt-4 leading-relaxed max-w-xs">{errorMessage}</p>
                        <button onClick={() => window.location.reload()} className="mt-8 px-8 py-3 bg-slate-900 text-white rounded-full font-bold text-xs uppercase tracking-widest">Retry</button>
                    </div>
                );
            }

            return (
                <div className="w-full min-h-screen py-4 sm:py-10 px-4 flex flex-col items-center overflow-x-hidden">
                    <div className="w-full max-w-md bg-white rounded-[40px] custom-shadow overflow-hidden flex flex-col min-h-[750px] animate-up border border-slate-100">
                        
                        {/* Header */}
                        <div className="bg-slate-900 px-8 py-10 text-white shrink-0 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-black italic tracking-tighter">SKY VISION</h1>
                                    <p className="text-[8px] font-bold opacity-30 uppercase tracking-[0.4em] mt-1">Resource Dispatcher v12.0</p>
                                </div>
                                <button onClick={() => setShowAdminLogin(true)} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-full text-[10px] font-black uppercase tracking-widest transition-all shadow-lg active:scale-90">Admin</button>
                            </div>
                        </div>

                        {/* Admin Login Modal */}
                        {showAdminLogin && !isAdmin && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-8">
                                <div className="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl animate-up">
                                    <h3 className="text-xl font-black mb-8 italic text-center uppercase tracking-widest text-slate-800 underline decoration-blue-500 decoration-4">Management Login</h3>
                                    <input type="password" autoFocus placeholder="Passcode..." className="w-full border-b-2 border-slate-100 py-4 mb-10 outline-none font-black text-4xl text-center focus:border-blue-600 transition-all" onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && (pwd === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Passcode Error'))}/>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowAdminLogin(false)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase hover:text-slate-900">Cancel</button>
                                        <button onClick={() => pwd === ADMIN_PASSWORD ? (setIsAdmin(true), setShowAdminLogin(false)) : alert('Passcode Error')} className="flex-1 bg-slate-900 text-white rounded-2xl py-4 font-black text-xs uppercase tracking-widest shadow-xl">Verify</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 p-8 sm:p-10 overflow-y-auto scrollbar-hide">
                            {isAdmin ? (
                                <div className="space-y-12 animate-fade-in pb-10">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-black italic underline decoration-blue-600 decoration-4 underline-offset-8">Admin Base</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b-2 border-slate-200">Exit Portal</button>
                                    </div>

                                    {/* 時段設定 */}
                                    <div className="bg-blue-50 p-6 rounded-[28px] border border-blue-100 shadow-inner">
                                        <label className="text-[10px] font-black text-blue-400 mb-4 block tracking-widest uppercase">師傅服務時段設定</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-[9px] font-black text-blue-300 mb-1">START</p>
                                                <input type="time" value={config.startTime} onChange={e => updateTimeRange('startTime', e.target.value)} className="w-full bg-white border border-blue-200 rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-black text-blue-300 mb-1">END</p>
                                                <input type="time" value={config.endTime} onChange={e => updateTimeRange('endTime', e.target.value)} className="w-full bg-white border border-blue-200 rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-6 rounded-[28px] border border-slate-100 shadow-inner">
                                        <label className="text-[10px] font-black text-slate-400 mb-4 block tracking-widest uppercase italic">日期發布管理</label>
                                        <div className="flex gap-3">
                                            <input type="date" value={newDateInput} onChange={e => setNewDateInput(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold outline-none" />
                                            <button onClick={addDate} className="bg-slate-900 text-white px-7 rounded-2xl font-black text-xs">ADD</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-6">
                                            {availableDates.map(d => (
                                                <div key={d.id} className="bg-white border border-slate-200 pl-4 pr-1.5 py-1.5 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm group">
                                                    {d.val}
                                                    <button onClick={() => removeDate(d.id)} className="w-6 h-6 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-times scale-75"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-1 border-l-4 border-slate-900 ml-1 pl-4">Record Monitor</h3>
                                        <div className="space-y-4">
                                            {bookings.sort((a,b) => b.createdAt - a.createdAt).map(b => (
                                                <div key={b.id} className="bg-white border border-slate-100 p-6 rounded-3xl flex justify-between items-center shadow-sm border-l-[8px] border-l-slate-900">
                                                    <div>
                                                        <span className="font-black text-slate-800 text-xl tracking-tight leading-none block mb-2">{b.date} <span className="text-blue-600 ml-2">{b.time}</span></span>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <i className="fas fa-user-circle"></i> {b.name} <span className="opacity-20">/</span> {b.duration}MIN
                                                        </p>
                                                    </div>
                                                    <button onClick={() => deleteBooking(b.id)} className="w-12 h-12 flex items-center justify-center text-slate-200 hover:text-red-500 transition-all active:scale-90"><i className="fas fa-trash-alt"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : !bookingConfirmed ? (
                                <div className="space-y-12 animate-fade-in pb-10">
                                    {/* Section 01: Date */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">01 / Choose Date</label>
                                        <div className="flex gap-4 overflow-x-auto pb-6 scrollbar-hide px-1">
                                            {availableDates.length === 0 ? <p className="text-[10px] text-slate-300 font-bold italic p-5 bg-slate-50 rounded-3xl w-full text-center">目前尚無開放日期...</p> : null}
                                            {availableDates.map(d => (
                                                <button key={d.id} onClick={() => {setSelectedDate(d.val); setSelectedSlot(null);}} className={`flex-shrink-0 px-8 py-7 rounded-[36px] border-2 transition-all flex flex-col items-center min-w-[140px] ${selectedDate === d.val ? 'border-blue-600 bg-blue-600 text-white shadow-2xl shadow-blue-600/40 scale-105 font-black' : 'border-slate-100 bg-white text-slate-400 hover:border-slate-200'}`}>
                                                    <span className="text-[10px] font-black opacity-60 mb-2 italic tracking-[0.2em]">{d.val.split('-')[1]}/{d.val.split('-')[2]}</span>
                                                    <span className="text-xl font-black uppercase tracking-tighter">{new Date(d.val).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Section 02 & 03 */}
                                    <div className="grid grid-cols-1 gap-12">
                                        <div className="space-y-6">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">02 / Identity</label>
                                            <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-50 border-0 border-b-2 border-slate-200 py-4 outline-none font-black text-3xl focus:border-blue-600 transition-all text-slate-900 placeholder:text-slate-200" placeholder="NAME..." />
                                        </div>
                                        <div className="space-y-6">
                                            <label className="text-[11px] font-black text-slate-400 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5">03 / Service</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                {[30, 60].map(dur => (
                                                    <button key={dur} onClick={() => {setSelectedDuration(dur); setSelectedSlot(null);}} className={`py-7 rounded-[28px] border-2 font-black transition-all flex flex-col items-center justify-center gap-1 ${selectedDuration === dur ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-xl' : 'border-slate-100 text-slate-400 bg-white hover:border-slate-200'}`}>
                                                        <span className="text-2xl leading-none">{dur}</span>
                                                        <span className="text-[9px] uppercase tracking-widest opacity-60">MIN</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Section 04: Time Slots */}
                                    <div>
                                        <label className="text-[11px] font-black text-slate-400 mb-6 block tracking-[0.3em] uppercase italic border-l-4 border-blue-600 pl-5 leading-none py-1">04 / Start Time ({config.startTime}-{config.endTime})</label>
                                        <div className="grid grid-cols-4 gap-3">
                                            {slots.map(s => {
                                                const occ = isOccupied(selectedDate, s.total, selectedDuration);
                                                const occupant = bookings.find(b => b.date === selectedDate && s.total >= b.startMin && s.total < (b.startMin + b.duration));
                                                return (
                                                    <button key={s.label} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-4 rounded-2xl text-[11px] font-black transition-all relative ${occ ? 'bg-slate-100 text-slate-300 border-0 opacity-40 cursor-not-allowed border-dashed border border-slate-200' : selectedSlot?.label === s.label ? 'bg-slate-900 text-white shadow-2xl scale-110 ring-4 ring-slate-100 z-10' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600 hover:shadow-md'}`}>
                                                        {s.label}
                                                        {occupant ? <span className="absolute -bottom-2 left-0 w-full text-[7px] text-slate-400 font-bold truncate px-1">{occupant.name}</span> : null}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="pt-8">
                                        <button disabled={!selectedSlot || !userName || isSyncing} onClick={submitBooking} className={`booking-btn w-full py-8 rounded-[36px] font-black text-2xl shadow-2xl transition-all flex items-center justify-center gap-5 ${!selectedSlot || !userName || isSyncing ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:brightness-110 shadow-blue-600/30 active:scale-95'}`}>
                                            {isSyncing ? <i className="fas fa-circle-notch animate-spin text-2xl"></i> : 'SECURE BOOKING'}
                                        </button>
                                    </div>

                                    {/* 公司預約全覽表 */}
                                    <div className="mt-12 pt-10 border-t border-slate-100">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 text-center">今日預約狀況表 (全公司公開)</h3>
                                        <div className="space-y-3">
                                            {bookings.filter(b => b.date === selectedDate).length === 0 ? (
                                                <p className="text-center text-slate-300 italic text-[10px]">該日期目前尚無預約</p>
                                            ) : (
                                                bookings.filter(b => b.date === selectedDate).sort((a,b) => a.startMin - b.startMin).map(b => (
                                                    <div key={b.id} className="flex justify-between items-center px-6 py-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                        <span className="font-black text-slate-800 text-sm">{b.time}</span>
                                                        <span className="font-black text-blue-600 text-sm italic">{b.name}</span>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-16 text-center space-y-12 animate-fade-in">
                                    <div className="relative inline-block scale-150">
                                        <div className="w-24 h-24 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl relative z-10 animate-bounce">
                                            <i className="fas fa-check text-4xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20"></div>
                                    </div>
                                    <div>
                                        <h2 className="text-5xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">SUCCESS!</h2>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.5em] text-[10px] mt-8 leading-relaxed px-10">預約資料已同步至公司雲端</p>
                                    </div>
                                    <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-400 hover:text-blue-600 font-black text-[12px] tracking-widest uppercase transition-all flex items-center justify-center gap-4 mx-auto py-10">
                                        <i className="fas fa-arrow-left"></i> 返回預約首頁
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
