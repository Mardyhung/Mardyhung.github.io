<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Vision 按摩預約調度系統</title>
    <!-- 引入 React 與基礎套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖標 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const START_HOUR = 18; const START_MIN = 30; const END_HOUR = 23; const SLOT_INTERVAL = 30;
            const ADMIN_PASSWORD = "23128951";

            const [larkConfig] = useState({ 
                appId: 'cli_a936584430b8ded2', 
                appSecret: 'CYSTv1bNrXph5p79YzHKKcWEyb2OAPiD', 
                appToken: 'XqCWbEx4ZamziBsuKhClW3YPgxf', 
                tableId: 'tblw0ocVXfvrXyOX' 
            });

            const [isAdmin, setIsAdmin] = useState(false);
            const [availableDates, setAvailableDates] = useState(['2025-05-20', '2025-05-22', '2025-05-23', '2025-05-24', '2025-05-25']);
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [bookedSlots, setBookedSlots] = useState([]); 
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [errorType, setErrorType] = useState(null); // 'CORS' | 'API'

            const fetchWithRetry = async (url, options, retries = 3) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.msg || `Lark 回傳錯誤 ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (err.name === 'TypeError' || err.message.includes('fetch')) {
                        setErrorType('CORS');
                        throw new Error("Lark 伺服器安全性攔截 (CORS)。這是因為瀏覽器端禁止直接發送包含 App Secret 的請求。");
                    }
                    throw err;
                }
            };

            const getLarkToken = async () => {
                const res = await fetchWithRetry("https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ app_id: larkConfig.appId, app_secret: larkConfig.appSecret })
                });
                return res.tenant_access_token;
            };

            const fetchBookings = async () => {
                if (!larkConfig.tableId) return;
                setIsSyncing(true);
                setErrorMsg('');
                setErrorType(null);
                try {
                    const token = await getLarkToken();
                    const res = await fetchWithRetry(`https://open.larksuite.com/open-apis/bitable/v1/apps/${larkConfig.appToken}/tables/${larkConfig.tableId}/records?page_size=100`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                    });
                    if (res.data?.items) {
                        setBookedSlots(res.data.items.map(item => ({
                            id: item.record_id,
                            date: item.fields.Date,
                            timeString: item.fields.Time,
                            duration: item.fields.Duration,
                            userName: item.fields.Name,
                            start: parseInt(item.fields.Time.split(':')[0]) * 60 + parseInt(item.fields.Time.split(':')[1])
                        })));
                    }
                } catch (e) { 
                    setErrorMsg(e.message);
                } finally { setIsSyncing(false); }
            };

            useEffect(() => { fetchBookings(); }, []);

            const slots = useMemo(() => {
                const s = [];
                let current = START_HOUR * 60 + START_MIN;
                while (current + selectedDuration <= END_HOUR * 60) {
                    s.push({ time: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, totalMinutes: current });
                    current += SLOT_INTERVAL;
                }
                return s;
            }, [selectedDuration]);

            const handleBooking = async () => {
                if (!userName.trim()) return alert("請填寫姓名");
                setIsSyncing(true);
                try {
                    const token = await getLarkToken();
                    const url = `https://open.larksuite.com/open-apis/bitable/v1/apps/${larkConfig.appToken}/tables/${larkConfig.tableId}/records`;
                    
                    await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fields: { "Name": userName, "Date": selectedDate, "Time": selectedSlot.time, "Duration": selectedDuration } })
                    });
                    setBookingConfirmed(true);
                    fetchBookings();
                } catch (e) { alert("操作失敗: " + e.message); } finally { setIsSyncing(false); }
            };

            return (
                <div className="max-w-xl mx-auto my-10 bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100 min-h-[600px] flex flex-col animate-fade-in">
                    <div className="bg-slate-900 p-8 text-white flex justify-between items-center shrink-0">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter italic">SKY VISION</h1>
                            <p className="text-[9px] font-bold opacity-40 uppercase tracking-widest italic">Smart Dispatcher</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={fetchBookings} className={`p-2 bg-slate-800 rounded-full ${isSyncing ? 'animate-spin' : ''}`}>
                                <i className="fas fa-sync-alt text-xs"></i>
                            </button>
                            <button onClick={() => setIsAdmin(!isAdmin)} className="text-[10px] bg-slate-800 px-4 py-2 rounded-full font-bold uppercase tracking-widest border border-slate-700">管理端</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto scrollbar-hide">
                        {errorType === 'CORS' && (
                            <div className="m-6 p-6 bg-red-50 border border-red-100 rounded-3xl animate-fade-in">
                                <h4 className="text-red-800 font-black text-sm mb-3 flex items-center gap-2">
                                    <i className="fas fa-shield-virus"></i> 技術安全性攔截 (CORS)
                                </h4>
                                <div className="space-y-4 text-[11px] text-red-700 leading-relaxed font-medium">
                                    <p>周董，您雖然已經在後台設定好網域，但 Lark 伺服器為了保護您的 <strong>App Secret</strong>，禁止瀏覽器直接進行權限驗證。</p>
                                    <div className="bg-white p-4 rounded-2xl border border-red-50">
                                        <p className="font-black mb-2 text-slate-800 uppercase">解決建議：</p>
                                        <ol className="list-decimal ml-4 space-y-2">
                                            <li><strong>使用 Lark 工作台</strong>：將此 HTML 網址配置到 Lark 應用的「網頁應用」中，並在 Lark 電腦版或手機版中打開，體驗會最穩定。</li>
                                            <li><strong>建立後端中轉</strong>：將獲取 Token 的邏輯移至伺服器端執行（如 Cloud Functions），這是最符合工業標準的做法。</li>
                                        </ol>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!bookingConfirmed ? (
                            <div className="p-8 space-y-8 animate-fade-in">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 mb-4 block tracking-widest uppercase italic underline decoration-blue-500 underline-offset-8">01 / 日期選擇</label>
                                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                        {availableDates.map(d => (
                                            <button key={d} onClick={() => {setSelectedDate(d); setSelectedSlot(null);}} className={`flex-shrink-0 px-6 py-4 rounded-2xl border-2 transition-all flex flex-col items-center min-w-[100px] ${selectedDate === d ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-xl scale-105 font-black' : 'border-slate-100 text-slate-300'}`}>
                                                <span className="text-[10px] font-bold opacity-60 mb-1">{d.slice(5)}</span>
                                                <span className="text-sm uppercase tracking-tighter">{new Date(d).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 mb-4 block tracking-widest uppercase italic underline decoration-blue-500 underline-offset-8">02 / 預約姓名</label>
                                    <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full border-b-2 border-slate-100 py-3 outline-none font-black text-2xl focus:border-blue-600 transition-all text-slate-800" placeholder="NAME..." />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 mb-4 block tracking-widest uppercase italic underline decoration-blue-500 underline-offset-8">03 / 時段 (18:30 起)</label>
                                    <div className="grid grid-cols-4 gap-2">
                                        {slots.map(s => {
                                            const occ = bookedSlots.some(b => b.date === selectedDate && b.start < (s.totalMinutes + selectedDuration) && s.totalMinutes < (b.start + b.duration));
                                            return (
                                                <button key={s.time} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-4 rounded-xl text-xs font-black transition-all ${occ ? 'bg-slate-50 text-slate-200 border-dashed border-slate-100 border cursor-not-allowed' : selectedSlot?.time === s.time ? 'bg-blue-600 text-white shadow-xl scale-105 ring-4 ring-blue-50' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-400'}`}>
                                                    {s.time}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                                <button disabled={!selectedSlot || !userName || isSyncing} onClick={handleBooking} className={`w-full py-6 rounded-[2.5rem] font-black text-xl shadow-2xl transition-all flex items-center justify-center gap-3 ${!selectedSlot || !userName || isSyncing ? 'bg-slate-100 text-slate-300' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-blue-100'}`}>
                                    {isSyncing ? <i className="fas fa-spinner animate-spin"></i> : '立即確認預約'}
                                </button>
                            </div>
                        ) : (
                            <div className="p-16 text-center space-y-8 animate-fade-in">
                                <div className="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto shadow-inner"><i className="fas fa-check text-4xl"></i></div>
                                <h2 className="text-4xl font-black italic tracking-tighter uppercase text-slate-900">Success!</h2>
                                <p className="text-slate-400 font-bold uppercase tracking-[0.3em] text-[10px]">資料已即時寫入多維表格</p>
                                <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-300 hover:text-slate-800 font-black text-[10px] tracking-widest uppercase py-4 transition-all">返回首頁</button>
                            </div>
                        )}
                    </div>

                    <div className="bg-slate-50 p-4 border-t border-slate-100 text-center shrink-0">
                        <p className="text-[8px] text-slate-300 font-black tracking-[0.6em] uppercase">Sky Vision Digital Infrastructure</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
