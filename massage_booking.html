<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Vision 按摩預約系統 v12.1</title>
    <!-- 核心框架 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 雲端資料庫 SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.fb = { initializeApp, getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, addDoc, updateDoc, getDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .custom-shadow { box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.2); }
        .booking-btn:active { transform: scale(0.96); }
        /* 增加全局呼吸空間 */
        .page-wrapper { padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const ADMIN_PASSWORD = "23128951";
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sky-vision-global';

            // --- 基礎狀態 ---
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [pwd, setPwd] = useState('');
            const [isBooting, setIsBooting] = useState(true);
            const [configMissing, setConfigMissing] = useState(false);

            // --- 業務資料 ---
            const [availableDates, setAvailableDates] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [settings, setSettings] = useState({ startTime: "18:30", endTime: "23:00" });

            // --- 預約表單狀態 ---
            const [selectedDate, setSelectedDate] = useState('');
            const [selectedDuration, setSelectedDuration] = useState(30);
            const [userName, setUserName] = useState('');
            const [selectedSlot, setSelectedSlot] = useState(null);
            const [bookingConfirmed, setBookingConfirmed] = useState(false);
            const [newDateInput, setNewDateInput] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);

            // --- Firebase 初始化 ---
            useEffect(() => {
                const init = async () => {
                    if (typeof __firebase_config === 'undefined') {
                        setConfigMissing(true);
                        setIsBooting(false);
                        return;
                    }
                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = fb.initializeApp(firebaseConfig);
                        const auth = fb.getAuth(app);
                        const store = fb.getFirestore(app);
                        setDb(store);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(auth);
                        }

                        fb.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setIsBooting(false);
                            }
                        });
                    } catch (e) {
                        console.error(e);
                        setIsBooting(false);
                    }
                };
                init();
            }, []);

            // --- 數據即時同步 ---
            useEffect(() => {
                if (!user || !db) return;

                // 1. 同步時段設定
                const settingsRef = fb.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                const unsubSettings = fb.onSnapshot(settingsRef, (d) => {
                    if (d.exists()) setSettings(d.data());
                });

                // 2. 同步開放日期
                const dateCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates');
                const unsubDates = fb.onSnapshot(dateCol, (snap) => {
                    setAvailableDates(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.val||'').localeCompare(b.val||'')));
                });

                // 3. 同步預約紀錄
                const bookCol = fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const unsubBooks = fb.onSnapshot(bookCol, (snap) => {
                    setBookings(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubSettings(); unsubDates(); unsubBooks(); };
            }, [user, db, appId]);

            // --- 管理員操作 ---
            const saveSettings = async (newSet) => {
                setSettings(newSet);
                await fb.setDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), newSet);
            };

            const addDate = async () => {
                if (!newDateInput) return;
                setIsSyncing(true);
                await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'available_dates'), { val: newDateInput });
                setNewDateInput('');
                setIsSyncing(false);
            };

            const removeDate = async (id) => {
                if (confirm("確定移除？")) await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'available_dates', id));
            };

            const deleteBooking = async (id) => {
                if (confirm("確定刪除此預約？")) await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id));
            };

            // --- 預約邏輯 ---
            const slots = useMemo(() => {
                const result = [];
                const [sH, sM] = settings.startTime.split(':').map(Number);
                const [eH, eM] = settings.endTime.split(':').map(Number);
                let current = sH * 60 + sM;
                const endLimit = eH * 60 + eM;
                while (current + 30 <= endLimit) {
                    result.push({ 
                        label: `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')}`, 
                        total: current 
                    });
                    current += 30;
                }
                return result;
            }, [settings]);

            const isOccupied = (date, start, duration) => {
                return bookings.some(b => b.date === date && start < (b.startMin + b.duration) && (start + duration) > b.startMin);
            };

            const submitBooking = async () => {
                if (!userName.trim() || !selectedSlot) return alert("請輸入完整資料");
                setIsSyncing(true);
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), {
                        name: userName.trim(),
                        date: selectedDate,
                        time: selectedSlot.label,
                        duration: selectedDuration,
                        startMin: selectedSlot.total,
                        createdAt: Date.now()
                    });
                    setBookingConfirmed(true);
                } catch(e) { alert("同步失敗"); }
                setIsSyncing(false);
            };

            if (isBooting) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-900 text-white font-black italic animate-pulse tracking-widest uppercase">
                        Establishing Connection...
                    </div>
                );
            }

            if (configMissing) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-white p-10 text-center">
                        <i className="fas fa-plug text-amber-500 text-4xl mb-6"></i>
                        <h2 className="text-xl font-black text-slate-800 tracking-tight uppercase">Config Needed</h2>
                        <p className="text-xs text-slate-400 mt-4 leading-relaxed max-w-xs">周董，此 HTML 檔案離開 Canvas 環境後需要手動填入 Firebase 配置才能執行雲端同步。</p>
                    </div>
                );
            }

            return (
                <div className="w-full min-h-screen page-wrapper flex flex-col items-center">
                    <div className="w-full max-w-[480px] bg-white rounded-[48px] custom-shadow overflow-hidden flex flex-col min-h-[820px] animate-up border border-slate-200/50">
                        
                        {/* Header */}
                        <div className="bg-slate-900 px-8 py-12 text-white shrink-0 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-blue-500/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-black italic tracking-tighter leading-none">SKY VISION</h1>
                                    <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.4em] mt-3">Smart Dispatcher v12.1</p>
                                </div>
                                <button onClick={() => setShowAdminLogin(true)} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-full text-[11px] font-black uppercase tracking-widest transition-all shadow-xl active:scale-90">Admin</button>
                            </div>
                        </div>

                        {/* Admin Login Modal */}
                        {showAdminLogin && !isAdmin && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-8">
                                <div className="bg-white p-10 rounded-[44px] w-full max-w-sm shadow-2xl animate-up">
                                    <h3 className="text-xl font-black mb-8 italic text-center uppercase tracking-widest text-slate-900">Security Gate</h3>
                                    <input type="password" autoFocus placeholder="Passcode..." className="w-full border-b-4 border-slate-100 py-4 mb-10 outline-none font-black text-4xl text-center focus:border-blue-600 transition-all" onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && (pwd === ADMIN_PASSWORD ? (setIsAdmin(true), setShowAdminLogin(false)) : alert('Error'))}/>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowAdminLogin(false)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Cancel</button>
                                        <button onClick={() => pwd === ADMIN_PASSWORD ? (setIsAdmin(true), setShowAdminLogin(false)) : alert('Error')} className="flex-1 bg-slate-900 text-white rounded-2xl py-4 font-black text-xs uppercase shadow-xl active:scale-95">Verify</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 p-8 sm:p-12 overflow-y-auto scrollbar-hide">
                            {isAdmin ? (
                                <div className="space-y-12 animate-fade-in pb-10">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-black italic underline decoration-blue-600 decoration-4 underline-offset-8 uppercase tracking-tighter">Control Center</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-[11px] font-bold text-slate-400 uppercase tracking-widest border-b-2 border-slate-200 pb-1">Exit</button>
                                    </div>

                                    {/* 開放時間設定 */}
                                    <div className="bg-blue-50 p-8 rounded-[36px] border border-blue-100 shadow-inner">
                                        <label className="text-[11px] font-black text-blue-400 mb-5 block tracking-[0.2em] uppercase">營業開放時段</label>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div>
                                                <p className="text-[10px] font-black text-blue-300 mb-2">START</p>
                                                <input type="time" value={settings.startTime} onChange={e => saveSettings({...settings, startTime: e.target.value})} className="w-full bg-white border border-blue-200 rounded-2xl px-4 py-3 text-sm font-bold outline-none" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-blue-300 mb-2">END</p>
                                                <input type="time" value={settings.endTime} onChange={e => saveSettings({...settings, endTime: e.target.value})} className="w-full bg-white border border-blue-200 rounded-2xl px-4 py-3 text-sm font-bold outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-8 rounded-[36px] border border-slate-100 shadow-inner">
                                        <label className="text-[11px] font-black text-slate-400 mb-5 block tracking-[0.2em] uppercase">日期公告板</label>
                                        <div className="flex gap-3">
                                            <input type="date" value={newDateInput} onChange={e => setNewDateInput(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold outline-none" />
                                            <button onClick={addDate} className="bg-slate-900 text-white px-8 rounded-2xl font-black text-xs hover:bg-black transition-all shadow-lg active:scale-95">ADD</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-8">
                                            {availableDates.map(d => (
                                                <div key={d.id} className="bg-white border border-slate-200 pl-4 pr-1.5 py-1.5 rounded-full text-[11px] font-black flex items-center gap-3 shadow-sm group">
                                                    {d.val}
                                                    <button onClick={() => removeDate(d.id)} className="w-7 h-7 flex items-center justify-center bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-times scale-75"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <h3 className="text-[12px] font-black text-slate-400 uppercase tracking-[0.3em] px-1 border-l-4 border-slate-900 ml-1 pl-5">Booking Log</h3>
                                        <div className="space-y-4">
                                            {bookings.sort((a,b) => b.createdAt - a.createdAt).map(b => (
                                                <div key={b.id} className="bg-white border border-slate-100 p-6 rounded-3xl flex justify-between items-center shadow-sm border-l-[10px] border-l-slate-900">
                                                    <div>
                                                        <span className="font-black text-slate-800 text-xl tracking-tight leading-none block mb-2">{b.date} <span className="text-blue-600 ml-2">{b.time}</span></span>
                                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                            <i className="fas fa-user-circle text-slate-300"></i> {b.name} <span className="opacity-20">/</span> {b.duration}MIN
                                                        </p>
                                                    </div>
                                                    <button onClick={() => deleteBooking(b.id)} className="w-12 h-12 flex items-center justify-center text-slate-200 hover:text-red-500 transition-all active:scale-90"><i className="fas fa-trash-alt text-lg"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : !bookingConfirmed ? (
                                <div className="space-y-14 animate-fade-in pb-10">
                                    {/* Section 01 */}
                                    <div className="px-1">
                                        <label className="text-[12px] font-black text-slate-400 mb-8 block tracking-[0.4em] uppercase italic border-l-4 border-blue-600 pl-6 leading-none py-1">01 / Choose Date</label>
                                        <div className="flex gap-4 overflow-x-auto pb-6 scrollbar-hide">
                                            {availableDates.length === 0 ? <p className="text-[11px] text-slate-300 font-bold italic p-6 bg-slate-50 rounded-3xl w-full text-center tracking-widest uppercase">No available dates</p> : null}
                                            {availableDates.map(d => (
                                                <button key={d.id} onClick={() => {setSelectedDate(d.val); setSelectedSlot(null);}} className={`flex-shrink-0 px-8 py-7 rounded-[40px] border-2 transition-all flex flex-col items-center min-w-[140px] ${selectedDate === d.val ? 'border-blue-600 bg-blue-600 text-white shadow-2xl shadow-blue-600/40 scale-105 font-black' : 'border-slate-100 bg-white text-slate-400 hover:border-slate-300'}`}>
                                                    <span className="text-[11px] font-black opacity-60 mb-2 italic tracking-[0.2em]">{d.val.split('-')[1]}/{d.val.split('-')[2]}</span>
                                                    <span className="text-2xl font-black uppercase tracking-tighter">{new Date(d.val).toLocaleDateString('zh-TW', {weekday: 'short'})}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Section 02 & 03 */}
                                    <div className="grid grid-cols-1 gap-14 px-1">
                                        <div className="space-y-8">
                                            <label className="text-[12px] font-black text-slate-400 block tracking-[0.4em] uppercase italic border-l-4 border-blue-600 pl-6">02 / Identity</label>
                                            <input type="text" value={userName} onChange={e => setUserName(e.target.value)} className="w-full bg-slate-50 border-0 border-b-4 border-slate-200 py-4 outline-none font-black text-4xl focus:border-blue-600 transition-all text-slate-900 placeholder:text-slate-100" placeholder="NAME..." />
                                        </div>
                                        <div className="space-y-8">
                                            <label className="text-[12px] font-black text-slate-400 block tracking-[0.4em] uppercase italic border-l-4 border-blue-600 pl-6">03 / Service</label>
                                            <div className="grid grid-cols-2 gap-5">
                                                {[30, 60].map(dur => (
                                                    <button key={dur} onClick={() => {setSelectedDuration(dur); setSelectedSlot(null);}} className={`py-8 rounded-[32px] border-2 font-black transition-all flex flex-col items-center justify-center gap-2 ${selectedDuration === dur ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-xl' : 'border-slate-100 text-slate-400 bg-white hover:border-slate-200'}`}>
                                                        <span className="text-4xl leading-none tracking-tighter">{dur}</span>
                                                        <span className="text-[11px] uppercase tracking-[0.2em] opacity-60 font-black">MINUTES</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Section 04: Time Slots */}
                                    <div className="px-1">
                                        <label className="text-[12px] font-black text-slate-400 mb-10 block tracking-[0.4em] uppercase italic border-l-4 border-blue-600 pl-6 leading-none py-1">04 / Start Time ({settings.startTime}-{settings.endTime})</label>
                                        <div className="grid grid-cols-4 gap-4">
                                            {slots.map(s => {
                                                const occ = isOccupied(selectedDate, s.total, selectedDuration);
                                                const occupant = bookings.find(b => b.date === selectedDate && s.total >= b.startMin && s.total < (b.startMin + b.duration));
                                                return (
                                                    <button key={s.label} disabled={occ || !selectedDate} onClick={() => setSelectedSlot(s)} className={`py-5 rounded-2xl text-[12px] font-black transition-all relative ${occ ? 'bg-slate-100 text-slate-300 border-0 opacity-40 cursor-not-allowed border-dashed border border-slate-200' : selectedSlot?.label === s.label ? 'bg-slate-900 text-white shadow-2xl scale-110 ring-4 ring-slate-100 z-10' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600 hover:shadow-md'}`}>
                                                        {s.label}
                                                        {occupant ? <span className="absolute -bottom-2 left-0 w-full text-[8px] text-slate-400 font-bold truncate px-1">{occupant.name}</span> : null}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="pt-10 px-1">
                                        <button disabled={!selectedSlot || !userName || isSyncing} onClick={submitBooking} className={`booking-btn w-full py-9 rounded-[40px] font-black text-2xl shadow-2xl transition-all flex items-center justify-center gap-5 ${!selectedSlot || !userName || isSyncing ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:brightness-110 shadow-blue-600/30 active:scale-95'}`}>
                                            {isSyncing ? <i className="fas fa-circle-notch animate-spin text-3xl"></i> : 'SECURE APPOINTMENT'}
                                        </button>
                                    </div>

                                    {/* 透明公示表 */}
                                    <div className="mt-16 pt-16 border-t border-slate-100">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.5em] mb-10 text-center">今日預約進度 (全公司公開)</h3>
                                        <div className="space-y-4">
                                            {bookings.filter(b => b.date === selectedDate).length === 0 ? (
                                                <p className="text-center text-slate-300 italic text-[11px] uppercase tracking-widest font-black">No bookings yet</p>
                                            ) : (
                                                bookings.filter(b => b.date === selectedDate).sort((a,b) => a.startMin - b.startMin).map(b => (
                                                    <div key={b.id} className="flex justify-between items-center px-8 py-5 bg-slate-50 rounded-3xl border border-slate-100 shadow-inner">
                                                        <span className="font-black text-slate-800 text-lg tracking-tighter uppercase">{b.time}</span>
                                                        <span className="font-black text-blue-600 text-lg italic tracking-tight">{b.name}</span>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-20 text-center space-y-16 animate-fade-in">
                                    <div className="relative inline-block scale-150">
                                        <div className="w-28 h-28 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl relative z-10 animate-bounce">
                                            <i className="fas fa-check text-4xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-20"></div>
                                    </div>
                                    <div>
                                        <h2 className="text-6xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">DONE!</h2>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.6em] text-[12px] mt-10 leading-relaxed px-10">資料已同步至<br/>公司雲端系統</p>
                                    </div>
                                    <button onClick={() => {setBookingConfirmed(false); setUserName(''); setSelectedSlot(null);}} className="text-slate-400 hover:text-blue-600 font-black text-[14px] tracking-widest uppercase transition-all flex items-center justify-center gap-4 mx-auto py-10 group">
                                        <i className="fas fa-arrow-left group-hover:-translate-x-3 transition-transform"></i> BACK TO SYSTEM
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="bg-white px-10 py-12 border-t border-slate-100 text-center shrink-0">
                            <p className="text-[10px] text-slate-400 font-black tracking-[0.8em] uppercase leading-relaxed italic opacity-40">
                                SKY VISION LEAGUE - DIGITAL INFRASTRUCTURE<br/>
                                <span className="text-blue-500/50">NODE-ID: {appId}</span> | Enterprise Cloud v12.1
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
